<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Roadster Scanner</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Inter,system-ui,sans-serif;background:#0a0a0f;color:#e8e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes cooldown{from{width:100%}to{width:0%}}
.fade{animation:fadein .25s ease;}
#qr-reader{width:100%;max-width:400px;border-radius:16px;overflow:hidden;}
#cooldown-bar{height:3px;background:#8B1C2C;border-radius:2px;width:0%;transition:none;}
#cooldown-bar.active{animation:cooldown 2s linear forwards;}
</style>
</head>
<body>
<div style="width:100%;max-width:440px;">

  <div style="text-align:center;margin-bottom:20px;">
    <div style="background:#8B1C2C;border-radius:10px;padding:8px 14px;display:inline-flex;align-items:center;gap:8px;margin-bottom:12px;">
      <svg width="24" height="16" viewBox="0 0 24 16" fill="none">
        <rect x="2" y="0" width="2" height="16" fill="white" rx="1"/>
        <rect x="6" y="2" width="1.5" height="12" fill="white" rx="1"/>
        <rect x="9" y="0" width="3" height="16" fill="white" rx="1"/>
        <rect x="14" y="2" width="1.5" height="12" fill="white" rx="1"/>
        <rect x="17" y="0" width="2" height="16" fill="white" rx="1"/>
        <rect x="21" y="2" width="1.5" height="12" fill="white" rx="1"/>
      </svg>
      <span style="color:#fff;font-size:13px;font-weight:800;">ROADSTER</span>
    </div>
    <div id="branch-label" style="font-size:12px;color:#5a5a7a;font-family:monospace;"></div>
  </div>

  <!-- Status -->
  <div id="status-box" style="border-radius:14px;background:rgba(255,255,255,.03);border:1px solid #252535;padding:12px 16px;display:flex;align-items:center;gap:12px;min-height:50px;margin-bottom:16px;transition:all .2s;">
    <span id="status-icon" style="font-size:18px;color:#5a5a7a;">▐</span>
    <span id="status-msg" style="font-size:14px;font-weight:600;color:#5a5a7a;">Ready to scan</span>
    <div id="sync-dot" style="display:none;margin-left:auto;width:8px;height:8px;border-radius:50%;background:#4f8ef7;animation:pulse 1s infinite;"></div>
  </div>

  <!-- Cooldown bar -->
  <div style="background:#1a1a26;border-radius:4px;margin-bottom:12px;overflow:hidden;height:3px;">
    <div id="cooldown-bar"></div>
  </div>

  <!-- Camera -->
  <div id="qr-reader" style="margin-bottom:16px;"></div>

  <!-- Last scan -->
  <div id="last-scan" style="display:none;background:#1a1a26;border:1px solid #252535;border-radius:14px;padding:14px 16px;margin-bottom:16px;">
    <div style="font-size:10px;color:#5a5a7a;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">Last Scan</div>
    <div id="last-product" style="font-size:15px;font-weight:700;margin-bottom:4px;"></div>
    <div id="last-barcode" style="font-size:11px;color:#5a5a7a;font-family:monospace;"></div>
    <div id="sync-status" style="font-size:11px;margin-top:6px;"></div>
  </div>

  <!-- Recent -->
  <div id="recent-container" style="display:none;">
    <div style="font-size:11px;font-weight:700;letter-spacing:1.5px;color:#5a5a7a;text-transform:uppercase;margin-bottom:10px;">
      Recent Scans · <span id="scan-count">0</span> total
    </div>
    <div id="recent-list" style="background:#12121a;border-radius:14px;overflow:hidden;border:1px solid #252535;"></div>
  </div>

</div>

<script>
var params = new URLSearchParams(window.location.search);
var SCRIPT_URL = params.get("url") || "";
var branch = params.get("branch") || "";

if(branch) document.getElementById("branch-label").textContent = branch.toUpperCase();

var pm = [], scans = [], count = 0, stimer = null;
var scanning = true; // cooldown flag

// Load products
if(SCRIPT_URL) {
  fetch(SCRIPT_URL + "?mode=products")
    .then(function(r){ return r.json(); })
    .then(function(d){ pm = d || []; })
    .catch(function(){});
}

function lookup(b){ return pm.find(function(p){ return p.barcode === b.trim(); }) || null; }

function postScan(s){
  if(!SCRIPT_URL) return;
  var url = SCRIPT_URL
    + "?action=scan"
    + "&branch=" + encodeURIComponent(s.branch)
    + "&barcode=" + encodeURIComponent(s.barcode)
    + "&productName=" + encodeURIComponent(s.productName)
    + "&timestamp=" + encodeURIComponent(s.timestamp)
    + "&found=" + encodeURIComponent(s.found);

  document.getElementById("sync-dot").style.display = "block";

  fetch(url, { mode: "no-cors" })
    .then(function(){
      document.getElementById("sync-dot").style.display = "none";
      document.getElementById("sync-status").textContent = "✓ Saved to sheet";
      document.getElementById("sync-status").style.color = "#00d084";
    })
    .catch(function(){
      document.getElementById("sync-dot").style.display = "none";
      document.getElementById("sync-status").textContent = "⚠ Sync failed";
      document.getElementById("sync-status").style.color = "#f5a623";
    });
}

function setStatus(t, msg){
  var box = document.getElementById("status-box");
  var icon = document.getElementById("status-icon");
  var msgEl = document.getElementById("status-msg");
  if(t === "ok"){
    box.style.background = "rgba(0,208,132,.08)"; box.style.borderColor = "rgba(0,208,132,.3)";
    icon.style.color = "#00d084"; icon.textContent = "✓"; msgEl.style.color = "#00d084";
  } else if(t === "warn"){
    box.style.background = "rgba(245,166,35,.08)"; box.style.borderColor = "rgba(245,166,35,.3)";
    icon.style.color = "#f5a623"; icon.textContent = "⚠"; msgEl.style.color = "#f5a623";
  } else if(t === "cooldown"){
    box.style.background = "rgba(139,28,44,.08)"; box.style.borderColor = "rgba(139,28,44,.3)";
    icon.style.color = "#8B1C2C"; icon.textContent = "⏳"; msgEl.style.color = "#8B1C2C";
  } else {
    box.style.background = "rgba(255,255,255,.03)"; box.style.borderColor = "#252535";
    icon.style.color = "#5a5a7a"; icon.textContent = "▐"; msgEl.style.color = "#5a5a7a";
  }
  msgEl.textContent = msg;
  if(stimer) clearTimeout(stimer);
  if(t !== "idle" && t !== "cooldown") {
    stimer = setTimeout(function(){ setStatus("idle","Ready to scan"); }, 2000);
  }
}

function startCooldown(){
  scanning = false;
  // Pause camera
  try { html5QrCode.pause(); } catch(e){}

  // Animate cooldown bar
  var bar = document.getElementById("cooldown-bar");
  bar.style.width = "100%";
  bar.style.animation = "none";
  bar.offsetHeight; // reflow
  bar.classList.add("active");

  setStatus("cooldown", "Next scan in 2s...");

  setTimeout(function(){
    scanning = true;
    bar.classList.remove("active");
    bar.style.width = "0%";
    setStatus("idle", "Ready to scan");
    // Resume camera
    try { html5QrCode.resume(); } catch(e){}
  }, 2000);
}

function doScan(val){
  if(!val || !val.trim()) return;
  if(!scanning) return; // in cooldown

  var p = lookup(val);
  var s = {
    branch: branch,
    barcode: val.trim(),
    productName: p ? p.name : "Unknown Product",
    timestamp: new Date().toISOString(),
    found: !!p
  };

  scans = [s].concat(scans.slice(0,49));
  count++;
  document.getElementById("scan-count").textContent = count;
  setStatus(p ? "ok" : "warn", p ? p.name : "Not in master list");

  // Last scan card
  var ls = document.getElementById("last-scan");
  ls.style.display = "block";
  ls.style.borderColor = p ? "rgba(0,208,132,.3)" : "rgba(245,166,35,.3)";
  document.getElementById("last-product").textContent = s.productName;
  document.getElementById("last-product").style.color = p ? "#00d084" : "#f5a623";
  document.getElementById("last-barcode").textContent = s.barcode;
  document.getElementById("sync-status").textContent = "Syncing...";
  document.getElementById("sync-status").style.color = "#5a5a7a";

  // Recent list
  document.getElementById("recent-container").style.display = "block";
  document.getElementById("recent-list").innerHTML = scans.map(function(sc,i){
    return '<div class="'+(i===0?"fade":"")+'" style="padding:10px 14px;border-bottom:'+(i<scans.length-1?"1px solid #252535":"none")+';background:'+(i===0?"#1a1a26":"#12121a")+'">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;">'
      +'<span style="font-size:12px;font-weight:600;color:'+(sc.found?"#e8e8f0":"#f5a623")+';flex:1;margin-right:8px;">'+sc.productName+'</span>'
      +(i===0?'<span style="font-size:9px;background:#8B1C2C;color:#fff;border-radius:4px;padding:1px 6px;font-weight:700;">NEW</span>'
             :'<div style="width:5px;height:5px;border-radius:50%;background:'+(sc.found?"#00d084":"#f5a623")+'"></div>')
      +'</div>'
      +'<div style="display:flex;justify-content:space-between;">'
      +'<span style="font-size:10px;color:#5a5a7a;font-family:monospace;">'+sc.barcode+'</span>'
      +'<span style="font-size:10px;color:#3a3a55;">'+new Date(sc.timestamp).toLocaleTimeString("en-GB")+'</span>'
      +'</div></div>';
  }).join("");

  postScan(s);
  startCooldown(); // pause for 2s after each scan
}

var html5QrCode = new Html5Qrcode("qr-reader");
html5QrCode.start(
  {facingMode:"environment"},
  {fps:10, qrbox:{width:280,height:280}},
  function(text){ doScan(text); },
  function(err){}
).catch(function(e){ setStatus("warn","Camera error: "+e); });
</script>
</body>
</html>
