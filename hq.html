<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HQ Dashboard — Roadster</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Inter,system-ui,sans-serif;background:#0a0a0f;color:#e8e8f0;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#8B1C2C;border-radius:2px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
select,input,button{font-family:inherit;}
.tb{background:transparent;border:none;padding:10px 16px;cursor:pointer;font-size:12px;font-weight:700;color:#5a5a7a;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s;}
.tb.on{color:#e8e8f0;border-bottom-color:#8B1C2C;}
::placeholder{color:#3a3a55;}
</style>
</head>
<body>
<div id="root"></div>

<script>
var params = new URLSearchParams(window.location.search);
var SCRIPT_URL = params.get("url") || localStorage.getItem("rd_script_url") || "";
if(SCRIPT_URL) localStorage.setItem("rd_script_url", SCRIPT_URL);

var BRANCHES = ["Roadster - Achrafieh","Roadster - Hamra","Roadster - Dbayeh","Roadster - Verdun","Roadster - ABC Ashrafieh","Roadster - City Mall","Roadster - Kaslik","Roadster - Jounieh","Deek Duke - Hamra","Deek Duke - Dbayeh","Bar Tartine - Gemmayzeh"];

var allScans = [];
var allProducts = [];
var filtered = [];
var filterBranch = "";
var searchQuery = "";
var tab = "scans";
var uploadMsg = "";
var loading = false;
var today = new Date().toISOString().split("T")[0];

function logo(){
  return '<div style="background:#8B1C2C;border-radius:8px;padding:6px 12px;display:inline-flex;align-items:center;gap:6px;">'
    +'<svg width="20" height="14" viewBox="0 0 24 16" fill="none">'
    +'<rect x="2" y="0" width="2" height="16" fill="white" rx="1"/>'
    +'<rect x="6" y="2" width="1.5" height="12" fill="white" rx="1"/>'
    +'<rect x="9" y="0" width="3" height="16" fill="white" rx="1"/>'
    +'<rect x="14" y="2" width="1.5" height="12" fill="white" rx="1"/>'
    +'<rect x="17" y="0" width="2" height="16" fill="white" rx="1"/>'
    +'<rect x="21" y="2" width="1.5" height="12" fill="white" rx="1"/>'
    +'</svg>'
    +'<span style="color:#fff;font-size:12px;font-weight:800;letter-spacing:0.5px;">ROADSTER</span>'
    +'</div>';
}

function fmt(ts){
  if(!ts) return "";
  var d = new Date(ts);
  return isNaN(d) ? ts : d.toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit",second:"2-digit"});
}

function applyFilter(){
  filtered = allScans.filter(function(s){
    var matchBranch = !filterBranch || s.branch === filterBranch;
    var matchSearch = !searchQuery || (s.productName||"").toLowerCase().includes(searchQuery.toLowerCase()) || (s.barcode||"").includes(searchQuery);
    return matchBranch && matchSearch;
  });
  render();
}

function loadAll(){
  if(!SCRIPT_URL) { render(); return; }
  loading = true; render();

  var p1 = fetch(SCRIPT_URL + "?mode=scans").then(function(r){return r.json();}).catch(function(){return [];});
  var p2 = fetch(SCRIPT_URL + "?mode=products").then(function(r){return r.json();}).catch(function(){return [];});

  Promise.all([p1, p2]).then(function(results){
    allScans = Array.isArray(results[0]) ? results[0] : [];
    allProducts = Array.isArray(results[1]) ? results[1] : [];
    filtered = allScans.slice();
    loading = false;
    render();
  });
}

function exportCSV(){
  var h = "Branch,Product,Barcode,Timestamp,Status\n";
  var rows = filtered.map(function(s){
    return '"'+s.branch+'","'+s.productName+'","'+s.barcode+'","'+s.timestamp+'","'+s.status+'"';
  });
  var a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([h+rows.join("\n")],{type:"text/csv"}));
  a.download = "scans_"+today+".csv";
  a.click();
}

function parseCSV(text){
  var lines = text.trim().split(/\r?\n/);
  if(lines.length < 2) return null;
  var h = lines[0].split(",").map(function(x){return x.trim().toLowerCase().replace(/"/g,"");});
  var bc = h.findIndex(function(x){return x.includes("barcode")||x.includes("code")||x.includes("sku");});
  var nc = h.findIndex(function(x){return x.includes("name")||x.includes("product")||x.includes("description");});
  if(bc===-1||nc===-1) return null;
  return lines.slice(1).map(function(l){
    var c = l.split(",").map(function(x){return x.trim().replace(/"/g,"");});
    return {barcode:c[bc], name:c[nc]};
  }).filter(function(r){return r.barcode && r.name;});
}

function handleUpload(e){
  var file = e.target.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    var parsed = parseCSV(ev.target.result);
    if(!parsed){ uploadMsg = "❌ Need columns: barcode, name"; render(); return; }
    fetch(SCRIPT_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({action:"saveProducts", products:parsed})
    }).then(function(){
      allProducts = parsed;
      uploadMsg = "✓ " + parsed.length + " products saved";
      render();
    }).catch(function(){
      uploadMsg = "❌ Upload failed";
      render();
    });
  };
  reader.readAsText(file);
}

function saveUrl(){
  var input = document.getElementById("url-input");
  if(input && input.value.trim()){
    SCRIPT_URL = input.value.trim();
    localStorage.setItem("rd_script_url", SCRIPT_URL);
    var url = new URL(window.location.href);
    url.searchParams.set("url", SCRIPT_URL);
    window.history.replaceState({}, "", url);
    loadAll();
  }
}

function render(){
  if(!SCRIPT_URL){
    document.getElementById("root").innerHTML =
      '<div style="min-height:100vh;background:#0a0a0f;display:flex;align-items:center;justify-content:center;padding:24px;">'
      +'<div style="width:100%;max-width:380px;text-align:center;">'
      +logo()
      +'<h2 style="font-size:18px;font-weight:700;color:#e8e8f0;margin:20px 0 6px;">Connect Google Sheet</h2>'
      +'<p style="color:#5a5a7a;font-size:12px;margin-bottom:20px;">Paste your Apps Script Web App URL</p>'
      +'<input id="url-input" type="text" placeholder="https://script.google.com/macros/s/.../exec" style="width:100%;background:#1a1a26;border:1px solid #252535;border-radius:10px;padding:12px 14px;font-size:12px;color:#e8e8f0;outline:none;font-family:JetBrains Mono,monospace;margin-bottom:14px;"/>'
      +'<button onclick="saveUrl()" style="width:100%;background:#8B1C2C;border:none;color:#fff;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;">Connect</button>'
      +'</div></div>';
    return;
  }

  var stats = {
    total: allScans.length,
    today: allScans.filter(function(s){return s.timestamp && (""+s.timestamp).startsWith(today);}).length,
    unknown: allScans.filter(function(s){return s.status === "Unknown";}).length,
    branches: [].concat.apply([], [allScans.map(function(s){return s.branch;})])
                .filter(function(v,i,a){return v && a.indexOf(v)===i;}).length
  };

  var h = '<div style="min-height:100vh;background:#0a0a0f;">';

  // Topbar
  h += '<div style="background:#12121a;border-bottom:1px solid #252535;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;">';
  h += '<div style="display:flex;align-items:center;gap:10px;">' + logo();
  h += '<div><div style="font-size:13px;font-weight:700;">HQ Dashboard</div>';
  h += '<div style="font-size:9px;color:#5a5a7a;font-family:JetBrains Mono,monospace;">HEAD OFFICE · ALL BRANCHES</div></div></div>';
  h += '<button onclick="loadAll()" style="background:#1a1a26;border:1px solid #252535;color:#e8e8f0;border-radius:8px;height:32px;padding:0 14px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:6px;">'
     + (loading ? '<div style="width:6px;height:6px;border-radius:50%;background:#4f8ef7;animation:pulse 1s infinite;"></div>' : '↻') + ' Refresh</button>';
  h += '</div>';

  // Content
  h += '<div style="padding:16px;max-width:1100px;margin:0 auto;">';

  // Stats
  var cards = [
    {l:"Total Scans", v:stats.total, c:"#8B1C2C"},
    {l:"Today", v:stats.today, c:"#00d084"},
    {l:"Unknown", v:stats.unknown, c:"#f5a623"},
    {l:"Branches", v:stats.branches, c:"#4f8ef7"}
  ];
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:22px;">';
  cards.forEach(function(s){
    h += '<div style="background:#1a1a26;border:1px solid #252535;border-left:3px solid '+s.c+';border-radius:14px;padding:16px;">';
    h += '<div style="font-size:9px;color:#5a5a7a;text-transform:uppercase;letter-spacing:1.2px;font-weight:700;margin-bottom:8px;">'+s.l+'</div>';
    h += '<div style="font-size:26px;font-weight:800;color:'+s.c+';font-family:JetBrains Mono,monospace;">'+s.v+'</div></div>';
  });
  h += '</div>';

  // Tabs
  h += '<div style="display:flex;border-bottom:1px solid #252535;margin-bottom:18px;">';
  h += '<button class="tb'+(tab==="scans"?" on":"")+'" onclick="tab=\'scans\';render();">Scan Logs</button>';
  h += '<button class="tb'+(tab==="products"?" on":"")+'" onclick="tab=\'products\';render();">Products</button>';
  h += '</div>';

  if(tab === "scans"){
    h += '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">';
    h += '<select onchange="filterBranch=this.value;applyFilter();" style="background:#1a1a26;border:1px solid #252535;color:#e8e8f0;border-radius:10px;padding:9px 12px;font-size:12px;outline:none;min-width:180px;">';
    h += '<option value="">All Branches</option>';
    BRANCHES.forEach(function(b){ h += '<option value="'+b+'"'+(filterBranch===b?" selected":"")+'>'+b+'</option>'; });
    h += '</select>';
    h += '<input type="text" placeholder="Search product or barcode..." oninput="searchQuery=this.value;applyFilter();" style="flex:1;min-width:180px;background:#1a1a26;border:1px solid #252535;color:#e8e8f0;border-radius:10px;padding:9px 14px;font-size:12px;outline:none;"/>';
    h += '<button onclick="exportCSV();" style="background:#1a1a26;border:1px solid #252535;color:#e8e8f0;border-radius:10px;padding:9px 16px;font-size:12px;cursor:pointer;">↓ Export CSV</button>';
    h += '</div>';

    h += '<div style="background:#12121a;border:1px solid #252535;border-radius:14px;overflow:hidden;">';

    // Table header (desktop-ish) — but kept simple/responsive as stacked rows
    if(loading){
      h += '<div style="padding:60px;text-align:center;color:#5a5a7a;">';
      h += '<div style="width:8px;height:8px;border-radius:50%;background:#4f8ef7;animation:pulse 1s infinite;margin:0 auto 14px;"></div>';
      h += 'Loading from Google Sheets...</div>';
    } else if(filtered.length === 0){
      h += '<div style="padding:60px;text-align:center;color:#3a3a55;">No scans found</div>';
    } else {
      filtered.forEach(function(s,i){
        h += '<div style="padding:13px 16px;border-bottom:'+(i<filtered.length-1?"1px solid #252535":"none")+';display:flex;align-items:center;gap:14px;flex-wrap:wrap;">';
        h += '<div style="flex:1;min-width:140px;">';
        h += '<div style="font-size:13px;font-weight:600;color:'+(s.status==="Unknown"?"#f5a623":"#e8e8f0")+';">'+(s.productName||"")+'</div>';
        h += '<div style="font-size:10px;color:#3a3a55;font-family:JetBrains Mono,monospace;margin-top:2px;">'+(s.barcode||"")+'</div>';
        h += '</div>';
        h += '<div style="font-size:11px;color:#5a5a7a;min-width:140px;">'+(s.branch||"")+'</div>';
        h += '<div style="font-size:10px;color:#3a3a55;min-width:140px;">'+fmt(s.timestamp)+'</div>';
        h += '<span style="font-size:10px;border-radius:5px;padding:3px 9px;font-weight:700;white-space:nowrap;background:'+(s.status==="Unknown"?"rgba(245,166,35,.12)":"rgba(0,208,132,.1)")+';color:'+(s.status==="Unknown"?"#f5a623":"#00d084")+';">'+(s.status||"").toUpperCase()+'</span>';
        h += '</div>';
      });
    }
    h += '</div>';
    if(!loading && filtered.length > 0) h += '<div style="padding:8px 2px;font-size:11px;color:#3a3a55;font-family:JetBrains Mono,monospace;">'+filtered.length+' records</div>';

  } else {
    h += '<div style="background:#12121a;border:1px dashed #252535;border-radius:14px;padding:30px;margin-bottom:18px;text-align:center;">';
    h += '<div style="font-size:13px;color:#5a5a7a;margin-bottom:4px;">Export Excel as CSV</div>';
    h += '<div style="font-size:11px;color:#3a3a55;margin-bottom:18px;">Columns needed: <code style="background:#1a1a26;padding:1px 6px;border-radius:4px;color:#8B1C2C;font-family:JetBrains Mono,monospace;">barcode</code> · <code style="background:#1a1a26;padding:1px 6px;border-radius:4px;color:#8B1C2C;font-family:JetBrains Mono,monospace;">name</code></div>';
    h += '<input type="file" id="csv-upload" accept=".csv" style="display:none;" onchange="handleUpload(event)"/>';
    h += '<button onclick="document.getElementById(\'csv-upload\').click();" style="background:#8B1C2C;border:none;color:#fff;border-radius:10px;padding:12px 28px;font-size:13px;font-weight:700;cursor:pointer;">↑ Upload Product Master</button>';
    if(uploadMsg) h += '<div style="margin-top:14px;font-size:12px;font-weight:600;color:'+(uploadMsg.startsWith("✓")?"#00d084":"#ef4444")+';font-family:JetBrains Mono,monospace;">'+uploadMsg+'</div>';
    h += '</div>';

    h += '<div style="background:#12121a;border:1px solid #252535;border-radius:14px;overflow:hidden;">';
    h += '<div style="padding:11px 16px;border-bottom:1px solid #252535;font-size:11px;font-weight:700;color:#5a5a7a;text-transform:uppercase;letter-spacing:1px;">'+allProducts.length+' Products in Master</div>';
    if(allProducts.length === 0){
      h += '<div style="padding:40px;text-align:center;color:#3a3a55;">No products yet</div>';
    } else {
      allProducts.forEach(function(p,i){
        h += '<div style="padding:11px 16px;border-bottom:'+(i<allProducts.length-1?"1px solid #252535":"none")+';display:flex;align-items:center;gap:14px;">';
        h += '<span style="font-size:11px;color:#5a5a7a;font-family:JetBrains Mono,monospace;min-width:120px;flex-shrink:0;">'+(p.barcode||"")+'</span>';
        h += '<span style="font-size:13px;font-weight:500;color:#e8e8f0;">'+(p.name||"")+'</span></div>';
      });
    }
    h += '</div>';
  }

  h += '</div></div>';
  document.getElementById("root").innerHTML = h;
}

render();
if(SCRIPT_URL) loadAll();
</script>
</body>
</html>
